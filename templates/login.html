<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — TaskFlow</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="page">
  <nav>
    <a href="/" class="nav-logo">Task<span>Flow</span></a>
    <div class="nav-links">
      <a href="/register" class="btn btn-primary btn-sm">Register</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your tasks</p>

      <div class="alert alert-error" id="errorMsg"></div>

      <div class="form-group">
  <label>Email</label>
  <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
</div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">
        Sign In
      </button>

      <div class="form-footer">
        No account yet? <a href="/register">Create one</a>
      </div>
    </div>
  </div>
</div>

<script>
// Redirect if already logged in
if (localStorage.getItem('token')) window.location.href = '/dashboard';

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  errEl.className = 'alert alert-error';

  if (!email || !password) {
    errEl.textContent = '⚠ Please enter email and password.';
    errEl.className = 'alert alert-error show';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  let res, data;

  try {
    res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })   // <-- changed from username
    });
  } catch (e) {
    errEl.textContent = '⚠ Network error: ' + e.message;
    errEl.className = 'alert alert-error show';
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
    return;
  }

  try { data = await res.json(); } catch (e) {
    errEl.textContent = '⚠ Server error (status ' + res.status + ').';
    errEl.className = 'alert alert-error show';
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
    return;
  }

  if (!res.ok) {
    let msg = 'Login failed.';
    if (data.detail) {
      msg = typeof data.detail === 'string' ? data.detail
          : Array.isArray(data.detail) ? data.detail.map(e => e.msg).join(', ')
          : JSON.stringify(data.detail);
    }
    errEl.textContent = '⚠ ' + msg;
    errEl.className = 'alert alert-error show';
    btn.disabled = false;
    btn.innerHTML = 'Sign In';
    return;
  }

  localStorage.setItem('token', data.access_token);
  localStorage.setItem('username', data.username || email.split('@')[0]);
  window.location.href = '/dashboard';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
