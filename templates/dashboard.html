<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="page">
  <nav>
    <a href="/" class="nav-logo">Task<span>Flow</span></a>
    <div class="nav-links">
      <span id="navUser" style="color:var(--text2);font-size:0.88rem;"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </nav>

  <div class="dashboard">
    <!-- Header -->
    <div class="dash-header">
      <div>
        <h1>Good day, <span id="headerUser">there</span> 👋</h1>
        <p>Here's an overview of your tasks</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Task</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card total">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card done">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="statDone">0</div>
      </div>
      <div class="stat-card pending">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
    </div>

    <!-- Tasks Section -->
    <div class="tasks-section">
      <div class="tasks-header">
        <div class="section-title">📋 My Tasks</div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('pending', this)">Pending</button>
          <button class="filter-tab" onclick="setFilter('done', this)">Done</button>
        </div>
      </div>
      <div id="tasksList" class="tasks-list">
        <div class="empty-state">
          <div class="icon">⏳</div>
          <p>Loading tasks...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h3>✦ New Task</h3>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="alert alert-error" id="addError"></div>
    <div class="form-group">
      <label>Task Title *</label>
      <input type="text" id="taskTitle" placeholder="What needs to be done?">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="taskDesc" placeholder="Optional details..."></textarea>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="taskPriority">
        <option value="high">🔴 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.2rem;">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-success" id="addTaskBtn" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- Edit Task Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>✎ Edit Task</h3>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="alert alert-error" id="editError"></div>
    <input type="hidden" id="editTaskId">
    <div class="form-group">
      <label>Task Title *</label>
      <input type="text" id="editTitle" placeholder="Task title">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="editDesc" placeholder="Optional details..."></textarea>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="editPriority">
        <option value="high">🔴 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.2rem;">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" id="saveEditBtn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
let allTasks = [];
let currentFilter = 'all';
const token = localStorage.getItem('token');
const username = localStorage.getItem('username') || 'there';

// Auth check
if (!token) { window.location.href = '/login'; }

// Init
document.getElementById('navUser').textContent = '@' + username;
document.getElementById('headerUser').textContent = username;

function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + token
  };
}

function showToast(msg, type = 'success') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = { success: '✓', error: '⚠', info: 'ℹ' };
  t.innerHTML = `<span>${icons[type]||'•'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}


function doLogout() {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  window.location.href = '/login';
}

function openAddModal() {
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskPriority').value = 'medium';
  document.getElementById('addError').className = 'alert alert-error';
  document.getElementById('addModal').classList.add('show');
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

// Load tasks
async function loadTasks() {
  try {
    const res = await fetch('/tasks/', { headers: authHeaders() });
    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) throw new Error('Failed');
    allTasks = await res.json();
    renderTasks();
    updateStats();
  } catch (e) {
    document.getElementById('tasksList').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠</div>
        <p>Could not load tasks. Refreshing...</p>
      </div>`;
    setTimeout(loadTasks, 3000);
  }
}

function updateStats() {
  const done = allTasks.filter(t => t.completed).length;
  document.getElementById('statTotal').textContent = allTasks.length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statPending').textContent = allTasks.length - done;
}

function renderTasks() {
  const list = document.getElementById('tasksList');
  let tasks = allTasks;
  if (currentFilter === 'pending') tasks = tasks.filter(t => !t.completed);
  if (currentFilter === 'done') tasks = tasks.filter(t => t.completed);

  if (tasks.length === 0) {
    const msgs = { all: 'No tasks yet. Add your first task!', pending: 'No pending tasks 🎉', done: 'No completed tasks yet.' };
    list.innerHTML = `<div class="empty-state"><div class="icon">✦</div><p>${msgs[currentFilter]}</p></div>`;
    return;
  }

  list.innerHTML = tasks.map(task => {
    const d = new Date(task.created_at);
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `
    <div class="task-card ${task.completed ? 'completed' : ''}" id="task-${task.id}">
      <div class="task-check ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id}, ${task.completed})"></div>
      <div class="task-body">
        <div class="task-title">${escHtml(task.title)}</div>
        ${task.description ? `<div class="task-desc">${escHtml(task.description)}</div>` : ''}
        <div class="task-meta">
          <span class="priority-badge priority-${task.priority}">${task.priority}</span>
          <span class="task-date">${dateStr}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${task.id})">Edit</button>
        <button class="btn btn-danger" onclick="deleteTask(${task.id})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Add Task
async function addTask() {
  const btn = document.getElementById('addTaskBtn');
  const errEl = document.getElementById('addError');
  const title = document.getElementById('taskTitle').value.trim();
  const desc = document.getElementById('taskDesc').value.trim();
  const priority = document.getElementById('taskPriority').value;

  errEl.className = 'alert alert-error';

  if (!title) {
    errEl.textContent = '⚠ Task title is required.';
    errEl.className = 'alert alert-error show';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Adding...';

  try {
    const res = await fetch('/tasks/', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ title, description: desc || null, priority })
    });

    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) {
      const d = await res.json();
      errEl.textContent = '⚠ ' + (d.detail || 'Failed to add task.');
      errEl.className = 'alert alert-error show';
      btn.disabled = false;
      btn.innerHTML = 'Add Task';
      return;
    }

    closeModal('addModal');
    showToast('Task added successfully!', 'success');
    await loadTasks();
  } catch (e) {
    errEl.textContent = '⚠ Server error. Please try again.';
    errEl.className = 'alert alert-error show';
  }

  btn.disabled = false;
  btn.innerHTML = 'Add Task';
}

// Toggle complete
async function toggleTask(id, currentState) {
  try {
    const res = await fetch(`/tasks/${id}`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ completed: !currentState })
    });
    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) throw new Error();
    showToast(!currentState ? '✓ Task completed!' : 'Task reopened', 'info');
    await loadTasks();
  } catch {
    showToast('Could not update task.', 'error');
  }
}

// Open edit modal
function openEdit(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  document.getElementById('editTaskId').value = id;
  document.getElementById('editTitle').value = task.title;
  document.getElementById('editDesc').value = task.description || '';
  document.getElementById('editPriority').value = task.priority;
  document.getElementById('editError').className = 'alert alert-error';
  document.getElementById('editModal').classList.add('show');
}

async function saveEdit() {
  const btn = document.getElementById('saveEditBtn');
  const errEl = document.getElementById('editError');
  const id = document.getElementById('editTaskId').value;
  const title = document.getElementById('editTitle').value.trim();
  const desc = document.getElementById('editDesc').value.trim();
  const priority = document.getElementById('editPriority').value;

  errEl.className = 'alert alert-error';

  if (!title) {
    errEl.textContent = '⚠ Task title is required.';
    errEl.className = 'alert alert-error show';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';

  try {
    const res = await fetch(`/tasks/${id}`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ title, description: desc || null, priority })
    });

    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) {
      errEl.textContent = '⚠ Could not update task.';
      errEl.className = 'alert alert-error show';
      btn.disabled = false;
      btn.innerHTML = 'Save Changes';
      return;
    }

    closeModal('editModal');
    showToast('Task updated!', 'success');
    await loadTasks();
  } catch {
    errEl.textContent = '⚠ Server error.';
    errEl.className = 'alert alert-error show';
  }

  btn.disabled = false;
  btn.innerHTML = 'Save Changes';
}

// Delete task
async function deleteTask(id) {
  if (!confirm('Delete this task? This cannot be undone.')) return;
  try {
    const res = await fetch(`/tasks/${id}`, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) throw new Error();
    showToast('Task deleted.', 'info');
    await loadTasks();
  } catch {
    showToast('Could not delete task.', 'error');
  }
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show'); });
});

// Enter key in add modal
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('addModal').classList.contains('show')) addTask();
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
  }
});

// Start
loadTasks();
</script>
</body>
</html>
